<svg width="360" height="100" viewBox="0 0 360 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="55%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="numGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clip">
      <rect x="0" y="0" width="360" height="100" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect x="0" y="0" width="360" height="100" fill="url(#bg)"/>

    <!-- drifting star field -->
    <circle cx="40" cy="20" r="1.2" fill="#ffffff" opacity="0.5">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="70" r="1" fill="#ffffff" opacity="0.4">
      <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="55" r="0.9" fill="#ffffff" opacity="0.3">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="18" r="0.8" fill="#ffffff" opacity="0.3">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.6s" repeatCount="indefinite"/>
    </circle>

    <!-- rocket icon, gentle float + flame flicker -->
    <g transform="translate(38,50)">
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -4; 0 0" dur="2.4s" repeatCount="indefinite"/>
        <g transform="rotate(45)" filter="url(#glow)">
          <path d="M0,-22 C10,-14 10,4 0,14 C-10,4 -10,-14 0,-22 Z" fill="#e2e8f0"/>
          <circle cx="0" cy="-8" r="4" fill="#3730a3"/>
          <path d="M-6,10 L-12,20 L-4,15 Z" fill="#a78bfa"/>
          <path d="M6,10 L12,20 L4,15 Z" fill="#a78bfa"/>
          <path d="M-3,14 C-1,20 1,20 3,14 C2,22 -2,22 -3,14 Z" fill="#fbbf24">
            <animate attributeName="d" dur="0.5s" repeatCount="indefinite"
              values="M-3,14 C-1,20 1,20 3,14 C2,22 -2,22 -3,14 Z;
                      M-3,14 C-1,24 1,24 3,14 C2,26 -2,26 -3,14 Z;
                      M-3,14 C-1,20 1,20 3,14 C2,22 -2,22 -3,14 Z"/>
          </path>
        </g>
      </g>
    </g>

    <!-- label -->
    <text x="78" y="38" font-family="Verdana, Geneva, sans-serif" font-size="11"
          fill="#c7d2fe" letter-spacing="1.5">PROBLEMS PUSHED</text>

    <!-- live dot + label -->
    <circle cx="82" cy="53" r="4" fill="#34d399">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="92" y="57" font-family="Verdana, Geneva, sans-serif" font-size="9"
          fill="#86efac">LIVE</text>

    <!-- big animated counter -->
    <text x="78" y="82" font-family="Consolas, 'Courier New', monospace" font-weight="bold"
          font-size="34" fill="url(#numGrad)" filter="url(#glow)">
      <tspan opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.9s" fill="freeze"/>
        {{TOTAL}}+
      </tspan>
    </text>

    <!-- count-up flicker frames (slot-machine style reveal before settling) -->
    <text x="78" y="82" font-family="Consolas, 'Courier New', monospace" font-weight="bold"
          font-size="34" fill="url(#numGrad)" opacity="0.9">
      <tspan>
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.75;0.751;1" dur="0.9s" fill="freeze"/>
        <animate attributeName="x" values="78;78" dur="0.9s" fill="freeze"/>
        0+
      </tspan>
    </text>

    <!-- sheen sweep across the whole badge -->
    <rect x="-120" y="0" width="60" height="100" fill="#ffffff" opacity="0.06">
      <animate attributeName="x" values="-120;420" dur="4.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- subtle border -->
  <rect x="0.5" y="0.5" width="359" height="99" rx="16" fill="none" stroke="#4c1d95" stroke-opacity="0.6"/>
</svg>
