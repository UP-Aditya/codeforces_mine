<svg width="200" height="56" viewBox="0 0 200 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="btnClip">
      <path d="M18,2 L200,2 L182,54 L0,54 Z"/>
    </clipPath>
    <linearGradient id="fillSweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#141414" stop-opacity="0"/>
      <stop offset="50%" stop-color="#141414" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#btnClip)">
    <!-- base button: white, skewed, matches the reference CSS -->
    <rect x="0" y="0" width="200" height="56" fill="#ffffff"/>

    <!-- slow ambient dark sweep standing in for the :hover fill,
         since GitHub loads this as a static image and can't trigger :hover -->
    <rect x="-200" y="0" width="200" height="56" fill="url(#fillSweep)">
      <animate attributeName="x" values="-200;200;200" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- skewed border outline -->
  <path d="M18,2 L200,2 L182,54 L0,54 Z" fill="none" stroke="#141414" stroke-width="1.5" opacity="0.15"/>

  <!-- label, counter-skewed back to upright like the reference span -->
  <text x="100" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="15" font-weight="700" letter-spacing="1" fill="#141414"
        style="text-transform:uppercase">52+ SOLVED</text>
</svg>
